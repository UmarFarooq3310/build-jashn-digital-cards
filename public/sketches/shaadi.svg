<svg viewBox="0 0 90 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- outer Mughal arch -->
  <path d="M8 118 L8 55 Q8 8 45 5 Q82 8 82 55 L82 118" stroke="#1e293b" stroke-width="1.6" fill="none"/>
  <!-- inner arch -->
  <path d="M16 118 L16 58 Q16 18 45 15 Q74 18 74 58 L74 118" stroke="#1e293b" stroke-width="0.9" fill="none" opacity="0.35"/>
  <!-- arch keystone ornament -->
  <ellipse cx="45" cy="8" rx="6" ry="4" stroke="#1e293b" stroke-width="1.1" fill="#fef9c3" opacity="0.6"/>
  <!-- groom silhouette left -->
  <circle cx="32" cy="66" r="9" stroke="#1e293b" stroke-width="1.4" fill="#e0e7ff" opacity="0.6"/>
  <path d="M22 90 Q22 80 32 76 Q42 80 42 90 L44 118 L20 118Z" stroke="#1e293b" stroke-width="1.3" fill="#e0e7ff" opacity="0.5"/>
  <!-- groom sherwani details -->
  <line x1="32" y1="78" x2="32" y2="95" stroke="#1e293b" stroke-width="0.9" opacity="0.4"/>
  <!-- groom turban / sehra -->
  <path d="M23 62 Q32 56 41 62" stroke="#1e293b" stroke-width="1.2" fill="none"/>
  <!-- bride silhouette right -->
  <circle cx="58" cy="66" r="9" stroke="#1e293b" stroke-width="1.4" fill="#fce7f3" opacity="0.7"/>
  <path d="M44 94 Q46 80 58 76 Q70 80 72 94 Q66 110 58 118 Q50 110 44 94Z" stroke="#1e293b" stroke-width="1.3" fill="#fce7f3" opacity="0.5"/>
  <!-- bride dupatta/veil -->
  <path d="M49 60 Q58 54 67 60 Q64 52 58 50 Q52 52 49 60Z" stroke="#1e293b" stroke-width="1.2" fill="#f0f9ff" opacity="0.6"/>
  <!-- joined hands in center -->
  <path d="M42 90 Q45 86 48 90" stroke="#1e293b" stroke-width="1.4" stroke-linecap="round"/>
  <!-- heart above couple -->
  <path d="M41 42 Q41 36 45 38 Q49 36 49 42 Q49 48 45 52 Q41 48 41 42Z" stroke="#1e293b" stroke-width="1.3" fill="#fce7f3" opacity="0.8"/>
  <!-- scattered petals -->
  <ellipse cx="15" cy="32" rx="5" ry="3" stroke="#1e293b" stroke-width="0.9" fill="#fce7f3" opacity="0.5" transform="rotate(-25 15 32)"/>
  <ellipse cx="75" cy="28" rx="5" ry="3" stroke="#1e293b" stroke-width="0.9" fill="#fce7f3" opacity="0.5" transform="rotate(20 75 28)"/>
  <ellipse cx="12" cy="80" rx="4" ry="2.5" stroke="#1e293b" stroke-width="0.8" fill="#fce7f3" opacity="0.4" transform="rotate(-15 12 80)"/>
  <ellipse cx="78" cy="75" rx="4" ry="2.5" stroke="#1e293b" stroke-width="0.8" fill="#fce7f3" opacity="0.4" transform="rotate(30 78 75)"/>
  <!-- sparkle stars at top corners -->
  <line x1="12" y1="98" x2="12" y2="104" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="9" y1="101" x2="15" y2="101" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="78" y1="94" x2="78" y2="100" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="75" y1="97" x2="81" y2="97" stroke="#fbbf24" stroke-width="1.2"/>
</svg>
