  <path d="M78 72 Q78 68 80.5 70 Q83 68 83 72 Q83 76 80.5 78 Q78 76 78 72Z" stroke="#1e293b" stroke-width="1" fill="#fce7f3" opacity="0.6"/>
  <!-- roses at bottom -->
  <circle cx="22" cy="115" r="7" stroke="#1e293b" stroke-width="1.2" fill="#fce7f3" opacity="0.6"/>
  <circle cx="19" cy="111" r="4" stroke="#1e293b" stroke-width="1" fill="#fce7f3" opacity="0.4"/>
  <line x1="22" y1="108" x2="20" y2="100" stroke="#1e293b" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="104" x2="16" y2="106" stroke="#1e293b" stroke-width="1"/>
  <circle cx="68" cy="115" r="7" stroke="#1e293b" stroke-width="1.2" fill="#fce7f3" opacity="0.6"/>
  <circle cx="65" cy="111" r="4" stroke="#1e293b" stroke-width="1" fill="#fce7f3" opacity="0.4"/>
  <line x1="68" y1="108" x2="70" y2="100" stroke="#1e293b" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="70" y1="104" x2="74" y2="106" stroke="#1e293b" stroke-width="1"/>
