<svg viewBox="0 0 90 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- diploma scroll -->
  <rect x="14" y="72" width="62" height="42" rx="5" stroke="#1e293b" stroke-width="1.6" fill="#fef9c3" opacity="0.6"/>
  <!-- scroll end caps -->
  <ellipse cx="14" cy="93" rx="5" ry="21" stroke="#1e293b" stroke-width="1.4" fill="#fef3c7" opacity="0.5"/>
  <ellipse cx="76" cy="93" rx="5" ry="21" stroke="#1e293b" stroke-width="1.4" fill="#fef3c7" opacity="0.5"/>
  <!-- ribbon -->
  <line x1="45" y1="72" x2="45" y2="114" stroke="#ef4444" stroke-width="1.8" opacity="0.6"/>
  <!-- text lines on diploma -->
  <line x1="28" y1="86" x2="62" y2="86" stroke="#1e293b" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="92" x2="58" y2="92" stroke="#1e293b" stroke-width="1" opacity="0.35"/>
  <line x1="36" y1="98" x2="54" y2="98" stroke="#1e293b" stroke-width="0.9" opacity="0.3"/>
  <!-- seal circle -->
  <circle cx="45" cy="107" r="5" stroke="#1e293b" stroke-width="1.1" fill="#fbbf24" opacity="0.4"/>
  <!-- mortarboard top -->
  <ellipse cx="45" cy="47" rx="28" ry="7" stroke="#1e293b" stroke-width="1.5" fill="#1e3a5f" opacity="0.8"/>
  <!-- mortarboard cap -->
  <rect x="30" y="28" width="30" height="20" rx="2" stroke="#1e293b" stroke-width="1.4" fill="#1e3a5f" opacity="0.75"/>
  <!-- tassel -->
  <line x1="73" y1="47" x2="80" y2="60" stroke="#1e293b" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="80" cy="63" r="4" stroke="#1e293b" stroke-width="1.2" fill="#fbbf24" opacity="0.7"/>
  <line x1="77" y1="67" x2="75" y2="74" stroke="#fbbf24" stroke-width="1"/>
  <line x1="80" y1="67" x2="80" y2="75" stroke="#fbbf24" stroke-width="1"/>
  <line x1="83" y1="67" x2="85" y2="74" stroke="#fbbf24" stroke-width="1"/>
  <!-- confetti -->
  <rect x="8" y="60" width="6" height="3" rx="0.5" fill="#f472b6" transform="rotate(-30 11 61)"/>
  <rect x="78" y="55" width="5" height="2.5" rx="0.5" fill="#34d399" transform="rotate(20 80 56)"/>
  <!-- sparkle stars -->
  <line x1="12" y1="20" x2="12" y2="28" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="8" y1="24" x2="16" y2="24" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="78" y1="16" x2="78" y2="24" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="74" y1="20" x2="82" y2="20" stroke="#fbbf24" stroke-width="1.2"/>
</svg>
