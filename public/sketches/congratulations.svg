  <line x1="75" y1="68" x2="75" y2="76" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="71" y1="72" x2="79" y2="72" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="20" y1="30" x2="20" y2="36" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="17" y1="33" x2="23" y2="33" stroke="#fbbf24" stroke-width="1.2"/>
