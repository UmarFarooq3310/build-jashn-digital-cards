  <circle cx="82" cy="42" r="2.5" fill="#f472b6" opacity="0.8"/>
  <circle cx="50" cy="25" r="2" fill="#818cf8" opacity="0.8"/>
  <circle cx="80" cy="20" r="2" fill="#34d399" opacity="0.8"/>
  <circle cx="40" cy="40" r="2" fill="#fb923c" opacity="0.7"/>
