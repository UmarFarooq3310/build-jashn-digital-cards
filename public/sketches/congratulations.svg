  <rect x="62" y="20" width="7" height="3.5" rx="1" fill="#818cf8" transform="rotate(15 65 21)"/>
  <rect x="72" y="38" width="6" height="3" rx="1" fill="#34d399" transform="rotate(-50 75 39)"/>
  <rect x="45" y="18" width="7" height="3" rx="1" fill="#fbbf24" transform="rotate(40 48 19)"/>
  <rect x="78" y="52" width="6" height="3" rx="1" fill="#f472b6" transform="rotate(-20 81 53)"/>
