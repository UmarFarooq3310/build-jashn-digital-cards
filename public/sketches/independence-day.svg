<svg viewBox="0 0 90 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- flag pole -->
  <rect x="22" y="12" width="3.5" height="90" rx="1.5" stroke="#1e293b" stroke-width="1.2" fill="#78716c"/>
  <!-- flag main (green part) -->
  <rect x="25.5" y="14" width="58" height="40" rx="2" stroke="#1e293b" stroke-width="1.3" fill="#d1fae5" opacity="0.7"/>
  <!-- white stripe left side of flag -->
  <rect x="25.5" y="14" width="13" height="40" stroke="none" fill="white" opacity="0.9"/>
  <line x1="38.5" y1="14" x2="38.5" y2="54" stroke="#1e293b" stroke-width="0.8" opacity="0.3"/>
  <!-- crescent on flag -->
  <circle cx="62" cy="34" r="11" stroke="#1e293b" stroke-width="1.2" fill="white" opacity="0.9"/>
  <circle cx="67" cy="30" r="8.5" stroke="none" fill="#d1fae5" opacity="0.9"/>
  <!-- star on flag -->
  <polygon points="75,24 76.5,28 81,28 77.5,31 79,35 75,32 71,35 72.5,31 69,28 73.5,28" stroke="#1e293b" stroke-width="0.9" fill="white" opacity="0.95"/>
  <!-- bunting strings -->
  <path d="M0 75 Q22 83 45 75 Q68 67 90 75" stroke="#1e293b" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M0 85 Q22 93 45 85 Q68 77 90 85" stroke="#1e293b" stroke-width="0.9" fill="none" opacity="0.4"/>
  <!-- bunting triangles on first string -->
  <polygon points="5,75 15,75 10,86" stroke="#1e293b" stroke-width="0.9" fill="#d1fae5" opacity="0.7"/>
  <polygon points="18,72 28,72 23,83" stroke="#1e293b" stroke-width="0.9" fill="white" opacity="0.7"/>
  <polygon points="36,74 46,74 41,85" stroke="#1e293b" stroke-width="0.9" fill="#d1fae5" opacity="0.7"/>
  <polygon points="54,76 64,76 59,87" stroke="#1e293b" stroke-width="0.9" fill="white" opacity="0.7"/>
  <polygon points="72,74 82,74 77,85" stroke="#1e293b" stroke-width="0.9" fill="#d1fae5" opacity="0.7"/>
  <!-- star sparkles -->
  <line x1="12" y1="100" x2="12" y2="106" stroke="#fbbf24" stroke-width="1.3"/>
  <line x1="9" y1="103" x2="15" y2="103" stroke="#fbbf24" stroke-width="1.3"/>
  <line x1="78" y1="96" x2="78" y2="102" stroke="#fbbf24" stroke-width="1.3"/>
  <line x1="75" y1="99" x2="81" y2="99" stroke="#fbbf24" stroke-width="1.3"/>
</svg>
