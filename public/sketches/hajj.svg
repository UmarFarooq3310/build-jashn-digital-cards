<svg viewBox="0 0 90 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- moon and star top -->
  <circle cx="66" cy="16" r="11" stroke="#1e293b" stroke-width="1.4" fill="#fef9c3" opacity="0.8"/>
  <circle cx="73" cy="12" r="8.5" stroke="none" fill="white"/>
  <polygon points="80,8 81.5,12 86,12 82.5,14.5 84,18 80,15.5 76,18 77.5,14.5 74,12 78.5,12" stroke="#1e293b" stroke-width="0.9" fill="#fef9c3" opacity="0.9"/>
  <!-- Kaaba center -->
  <rect x="30" y="55" width="30" height="34" stroke="#1e293b" stroke-width="2" fill="#1e293b" opacity="0.1"/>
  <!-- top of Kaaba isometric -->
  <line x1="30" y1="55" x2="38" y2="46" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="60" y1="55" x2="68" y2="46" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="38" y1="46" x2="68" y2="46" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Kiswah border -->
  <rect x="30" y="57" width="30" height="7" stroke="#1e293b" stroke-width="1" fill="#1e293b" opacity="0.15"/>
  <!-- Kaaba door -->
  <rect x="40" y="72" width="10" height="17" rx="1.5" stroke="#1e293b" stroke-width="1.2" fill="#fef9c3" opacity="0.5"/>
  <!-- Black stone circle -->
  <circle cx="30" cy="65" r="3.5" stroke="#1e293b" stroke-width="1.1" fill="#d1d5db" opacity="0.6"/>
  <!-- Tawaf circles (pilgrims walking) -->
  <circle cx="45" cy="72" r="28" stroke="#1e293b" stroke-width="0.9" stroke-dasharray="3,3" opacity="0.3"/>
  <circle cx="45" cy="72" r="34" stroke="#1e293b" stroke-width="0.7" stroke-dasharray="2,4" opacity="0.2"/>
  <!-- pilgrim silhouettes (simple dots on tawaf circle) -->
  <circle cx="45" cy="44" r="2" fill="#1e293b" opacity="0.4"/>
  <circle cx="73" cy="72" r="2" fill="#1e293b" opacity="0.4"/>
  <circle cx="17" cy="72" r="2" fill="#1e293b" opacity="0.4"/>
  <circle cx="59" cy="48" r="1.5" fill="#1e293b" opacity="0.3"/>
  <circle cx="31" cy="48" r="1.5" fill="#1e293b" opacity="0.3"/>
  <!-- sparkle -->
  <line x1="10" y1="30" x2="10" y2="36" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="7" y1="33" x2="13" y2="33" stroke="#fbbf24" stroke-width="1.2"/>
  <!-- ground -->
  <line x1="10" y1="108" x2="80" y2="108" stroke="#1e293b" stroke-width="0.8" opacity="0.3"/>
</svg>
