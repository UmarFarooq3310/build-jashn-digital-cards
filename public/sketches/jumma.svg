<svg viewBox="0 0 90 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- crescent -->
  <circle cx="45" cy="18" r="13" stroke="#1e293b" stroke-width="1.5" fill="#fef9c3" opacity="0.8"/>
  <circle cx="52" cy="14" r="10" stroke="none" fill="white"/>
  <!-- small star -->
  <polygon points="60,10 61,13 65,13 62,15 63,18 60,16 57,18 58,15 55,13 59,13" stroke="#1e293b" stroke-width="0.9" fill="#fef9c3" opacity="0.9"/>
  <!-- background dots -->
  <circle cx="12" cy="10" r="1.2" fill="#1e293b" opacity="0.3"/>
  <circle cx="80" cy="12" r="1" fill="#1e293b" opacity="0.3"/>
  <!-- large mosque -->
  <rect x="12" y="78" width="66" height="38" stroke="#1e293b" stroke-width="1.5" fill="#f0f9ff" opacity="0.4"/>
  <!-- main dome -->
  <path d="M24 78 Q24 55 45 52 Q66 55 66 78" stroke="#1e293b" stroke-width="1.5" fill="#e0f2fe" opacity="0.45"/>
  <!-- dome spire -->
  <line x1="45" y1="52" x2="45" y2="44" stroke="#1e293b" stroke-width="1.3"/>
  <circle cx="45" cy="43" r="2.5" stroke="#1e293b" stroke-width="1" fill="#fef9c3" opacity="0.9"/>
  <!-- side domes -->
  <path d="M12 78 Q12 68 20 66 Q28 68 28 78" stroke="#1e293b" stroke-width="1.2" fill="#e0f2fe" opacity="0.35"/>
  <path d="M62 78 Q62 68 70 66 Q78 68 78 78" stroke="#1e293b" stroke-width="1.2" fill="#e0f2fe" opacity="0.35"/>
  <!-- minarets -->
  <rect x="4" y="62" width="8" height="36" rx="2" stroke="#1e293b" stroke-width="1.2" fill="#f0f9ff" opacity="0.4"/>
  <polygon points="4,62 8,52 12,62" stroke="#1e293b" stroke-width="1" fill="#e0f2fe" opacity="0.4"/>
  <circle cx="8" cy="51" r="2" stroke="#1e293b" stroke-width="0.9" fill="#fef9c3" opacity="0.7"/>
  <rect x="78" y="62" width="8" height="36" rx="2" stroke="#1e293b" stroke-width="1.2" fill="#f0f9ff" opacity="0.4"/>
  <polygon points="78,62 82,52 86,62" stroke="#1e293b" stroke-width="1" fill="#e0f2fe" opacity="0.4"/>
  <circle cx="82" cy="51" r="2" stroke="#1e293b" stroke-width="0.9" fill="#fef9c3" opacity="0.7"/>
  <!-- arched entrance -->
  <path d="M38 116 L38 98 Q38 90 45 88 Q52 90 52 98 L52 116" stroke="#1e293b" stroke-width="1.2"/>
  <!-- calligraphy decorative line -->
  <path d="M18 42 Q45 38 72 42" stroke="#1e293b" stroke-width="0.9" stroke-dasharray="3,3" opacity="0.4"/>
</svg>
