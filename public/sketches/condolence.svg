<svg viewBox="0 0 90 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- soft light rays from above -->
  <line x1="45" y1="10" x2="20" y2="45" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <line x1="45" y1="10" x2="45" y2="48" stroke="#94a3b8" stroke-width="1.2" opacity="0.5"/>
  <line x1="45" y1="10" x2="70" y2="45" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <circle cx="45" cy="8" r="5" stroke="#94a3b8" stroke-width="1" fill="#fef9c3" opacity="0.4"/>
  <!-- olive tree trunk and branch -->
  <line x1="45" y1="118" x2="45" y2="50" stroke="#4b5563" stroke-width="1.8"/>
  <!-- leaves (pairs along branch) -->
  <ellipse cx="32" cy="88" rx="13" ry="7" stroke="#4b5563" stroke-width="1.1" fill="#d1fae5" opacity="0.5" transform="rotate(-30 32 88)"/>
  <ellipse cx="58" cy="80" rx="13" ry="7" stroke="#4b5563" stroke-width="1.1" fill="#d1fae5" opacity="0.45" transform="rotate(28 58 80)"/>
  <ellipse cx="34" cy="68" rx="11" ry="6" stroke="#4b5563" stroke-width="1" fill="#d1fae5" opacity="0.45" transform="rotate(-20 34 68)"/>
  <ellipse cx="56" cy="62" rx="11" ry="6" stroke="#4b5563" stroke-width="1" fill="#d1fae5" opacity="0.4" transform="rotate(22 56 62)"/>
  <ellipse cx="38" cy="55" rx="9" ry="5" stroke="#4b5563" stroke-width="0.9" fill="#d1fae5" opacity="0.4" transform="rotate(-15 38 55)"/>
  <!-- small olive berries -->
  <circle cx="28" cy="84" r="2" stroke="#4b5563" stroke-width="0.8" fill="#86efac" opacity="0.4"/>
  <circle cx="54" cy="76" r="2" stroke="#4b5563" stroke-width="0.8" fill="#86efac" opacity="0.4"/>
  <!-- crescent (Islamic calming symbol) -->
  <circle cx="45" cy="30" r="10" stroke="#94a3b8" stroke-width="1.3" fill="#f8fafc" opacity="0.7"/>
  <circle cx="50" cy="27" r="7.5" stroke="none" fill="white"/>
  <!-- decorative dashed border line bottom -->
  <path d="M15 108 Q45 103 75 108" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" fill="none" opacity="0.4"/>
</svg>
