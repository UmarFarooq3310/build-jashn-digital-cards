  <polygon points="5,55 8.5,46 12,55" stroke="#1e293b" stroke-width="1" fill="#e0f2fe" opacity="0.4"/>
  <rect x="78" y="55" width="7" height="32" rx="1.5" stroke="#1e293b" stroke-width="1.1" fill="#f0f9ff" opacity="0.4"/>
  <polygon points="78,55 81.5,46 85,55" stroke="#1e293b" stroke-width="1" fill="#e0f2fe" opacity="0.4"/>
