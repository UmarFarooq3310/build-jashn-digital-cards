<svg viewBox="0 0 90 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- crescent at top -->
  <circle cx="45" cy="15" r="11" stroke="#1e293b" stroke-width="1.4" fill="#fef9c3" opacity="0.8"/>
  <circle cx="51" cy="11" r="8.5" stroke="none" fill="white"/>
  <polygon points="59,7 60.5,11 65,11 61.5,13.5 63,17 59,14.5 55,17 56.5,13.5 53,11 57.5,11" stroke="#1e293b" stroke-width="0.9" fill="#fef9c3" opacity="0.9"/>
