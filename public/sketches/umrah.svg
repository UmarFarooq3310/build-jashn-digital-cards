  <rect x="18" y="62" width="5" height="20" rx="1" stroke="#1e293b" stroke-width="1" fill="#f0f9ff" opacity="0.35"/>
  <polygon points="18,62 20.5,55 23,62" stroke="#1e293b" stroke-width="0.9" fill="#e0f2fe" opacity="0.35"/>
  <rect x="67" y="62" width="5" height="20" rx="1" stroke="#1e293b" stroke-width="1" fill="#f0f9ff" opacity="0.35"/>
  <polygon points="67,62 69.5,55 72,62" stroke="#1e293b" stroke-width="0.9" fill="#e0f2fe" opacity="0.35"/>
