  <!-- horizontal ribbon on lid -->
  <line x1="14" y1="59" x2="76" y2="59" stroke="#ef4444" stroke-width="1.8"/>
  <!-- bow left loop -->
  <path d="M45 52 Q30 38 22 44 Q18 50 30 52 Q38 52 45 52Z" stroke="#1e293b" stroke-width="1.4" fill="#fce7f3" opacity="0.6"/>
  <!-- bow right loop -->
  <path d="M45 52 Q60 38 68 44 Q72 50 60 52 Q52 52 45 52Z" stroke="#1e293b" stroke-width="1.4" fill="#fce7f3" opacity="0.6"/>
  <!-- bow knot -->
