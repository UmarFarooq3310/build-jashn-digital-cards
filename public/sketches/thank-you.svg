  <!-- left ribbon tail -->
  <path d="M45 52 Q38 58 32 56" stroke="#1e293b" stroke-width="1.2" fill="none"/>
  <!-- right ribbon tail -->
  <path d="M45 52 Q52 58 58 56" stroke="#1e293b" stroke-width="1.2" fill="none"/>
  <!-- floating hearts -->
  <path d="M12 28 Q12 22 16 24 Q20 22 20 28 Q20 34 16 37 Q12 34 12 28Z" stroke="#1e293b" stroke-width="1.2" fill="#fce7f3" opacity="0.7"/>
  <path d="M68 22 Q68 17 71 19 Q74 17 74 22 Q74 27 71 30 Q68 27 68 22Z" stroke="#1e293b" stroke-width="1.2" fill="#fce7f3" opacity="0.7"/>
  <path d="M78 40 Q78 36 80.5 38 Q83 36 83 40 Q83 44 80.5 46 Q78 44 78 40Z" stroke="#1e293b" stroke-width="1" fill="#fce7f3" opacity="0.6"/>
