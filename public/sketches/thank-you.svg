<svg viewBox="0 0 90 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- gift box body -->
  <rect x="18" y="62" width="54" height="48" rx="3" stroke="#1e293b" stroke-width="1.6" fill="#fef9c3" opacity="0.6"/>
  <!-- gift box lid -->
  <rect x="14" y="52" width="62" height="14" rx="3" stroke="#1e293b" stroke-width="1.5" fill="#fef9c3" opacity="0.7"/>
