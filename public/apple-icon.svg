  <path d="M778 204 C778 234 793 248 823 248 C793 248 778 262 778 292 C778 262 763 248 733 248 C763 248 778 234 778 204Z" fill="url(#spark)"/>

  <!-- Small sparkle bottom-left -->
  <path d="M250 780 C250 800 258 808 278 808 C258 808 250 816 250 836 C250 816 242 808 222 808 C242 808 250 800 250 780Z" fill="url(#spark)" opacity="0.7"/>
</svg>
