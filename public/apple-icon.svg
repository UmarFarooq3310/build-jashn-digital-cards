  <path d="M184 388 L512 552 L840 388" stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Heart centred on card -->
  <path d="M512 666 C512 666 408 582 408 521 C408 483 436 455 474 455 C492 455 506 463 512 474 C518 463 532 455 550 455 C588 455 616 483 616 521 C616 582 512 666 512 666Z" fill="white" fill-opacity="0.85"/>

